# fly.toml app configuration file generated for ai-microservice-wwbb9w on 2026-04-19T03:33:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-microservice-wwbb9w'
primary_region = 'ams'

[build]
   dockerfile = 'Dockerfile'

[env]
   ENVIRONMENT = 'production'
   LOG_LEVEL = 'INFO'
   GROQ_MODEL = 'llama-3.1-8b-instant'
   ALLOWED_ORIGINS = 'https://mutual-fund-bot-groww.vercel.app'
   PORT = '8000'
   SOURCE_MANIFEST_PATH = 'data/sources/groww_sources.json'
   VECTOR_INDEX_PATH = 'data/index/faiss'
   CHUNK_STORE_PATH = 'data/index/chunks.json'

[http_service]
  internal_port = 8000
  force_https = true
   auto_stop_machines = 'off'
  auto_start_machines = true
   min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
   grace_period = '20s'
   interval = '15s'
   method = 'GET'
   timeout = '5s'
   path = '/v1/health/live'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
   memory_mb = 1024
